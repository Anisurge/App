name: Build and Release Anisurge-KMP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Generate Versioning
        id: version
        run: |
          OFFSET=15
          BUILD_NUMBER=$((OFFSET + GITHUB_RUN_NUMBER))
          echo "build_num=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          else
            VERSION_NAME=$(grep '^app-version' gradle/libs.versions.toml | sed 's/.*= *"\(.*\)"/\1/')
          fi
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          mkdir -p signing
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > signing/android.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
          echo "keyAlias=release" >> key.properties
          echo "storeFile=../signing/android.jks" >> key.properties

      - name: Decode google-services.json
        run: |
          GOOGLE_SERVICES_SECRET="${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}"
          if printf '%s' "$GOOGLE_SERVICES_SECRET" | tr -d '\r\n ' | base64 --decode > composeApp/google-services.json.tmp 2>/dev/null; then
            mv composeApp/google-services.json.tmp composeApp/google-services.json
          else
            printf '%s' "$GOOGLE_SERVICES_SECRET" > composeApp/google-services.json
            rm -f composeApp/google-services.json.tmp
          fi

      - name: Build Android APK
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:assembleRelease --no-daemon \
            -PappVersion=${{ steps.version.outputs.version_name }} \
            -PappBuildNumber=${{ steps.version.outputs.build_num }}

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Versioning
        id: version
        run: |
          OFFSET=15
          BUILD_NUMBER=$((OFFSET + GITHUB_RUN_NUMBER))
          echo "build_num=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          else
            VERSION_NAME=$(grep '^app-version' gradle/libs.versions.toml | sed 's/.*= *"\(.*\)"/\1/')
          fi
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm desktop-file-utils fakeroot p7zip-full

      - name: Download and Bundle MPV Library
        run: |
          mkdir -p composeApp/src/desktopMain/resources/native
          # MPV for Linux - using system library is preferred, but we can bundle if needed
          # For now, skip bundling as most Linux systems have libmpv installed
          echo "Linux will use system libmpv library"

      - name: Build Linux Distributions
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:packageDeb :composeApp:packageRpm :composeApp:packageAppImage :composeApp:createPortableZip --no-daemon -PappVersion="${{ steps.version.outputs.version_name }}" -PappBuildNumber="${{ steps.version.outputs.build_num }}"

      - name: Collect Linux Artifacts
        run: |
          mkdir -p dist
          find composeApp/build/compose/binaries/main/deb/  -name '*.deb'      -exec cp {} dist/ \; 2>/dev/null || true
          find composeApp/build/compose/binaries/main/rpm/  -name '*.rpm'      -exec cp {} dist/ \; 2>/dev/null || true
          find composeApp/build/compose/binaries/main/app/  -name '*.AppImage' -exec cp {} dist/ \; 2>/dev/null || true
          find composeApp/build/distributions/              -name '*.zip'      -exec cp {} dist/ \; 2>/dev/null || true
          ls -lh dist/

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-distributions
          path: dist/
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Versioning
        id: version
        shell: bash
        run: |
          OFFSET=15
          BUILD_NUMBER=$((OFFSET + GITHUB_RUN_NUMBER))
          echo "build_num=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          else
            VERSION_NAME=$(grep '^app-version' gradle/libs.versions.toml | sed 's/.*= *"\(.*\)"/\1/')
          fi
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Download and Bundle MPV Library
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "composeApp\src\desktopMain\resources\native"
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/7zr.exe" -OutFile "7zr.exe"
          $headers = @{ "User-Agent" = "Mozilla/5.0" }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases?per_page=20" -Headers $headers
          $asset = $releases | ForEach-Object { $_.assets } | Where-Object { $_.name -like "mpv-dev-x86_64-v3-*.7z" -or $_.name -like "mpv-dev-x86_64-*.7z" } | Select-Object -First 1
          if (-not $asset) { throw "Could not find an mpv-dev x86_64 release asset" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "mpv-dev.7z" -Headers $headers
          .\7zr.exe x mpv-dev.7z -ompv-extracted
          $dll = Get-ChildItem -Path "mpv-extracted" -Recurse -Filter "libmpv-2.dll" | Select-Object -First 1
          if (-not $dll) { throw "libmpv-2.dll was not found in the extracted MPV archive" }
          Copy-Item $dll.FullName "composeApp\src\desktopMain\resources\native\mpv-2.dll"

      - name: Decode Signing Certificate
        shell: pwsh
        run: |
          mkdir signing -Force
          [System.IO.File]::WriteAllBytes("signing/windows.pfx", [System.Convert]::FromBase64String("${{ secrets.WINDOWS_PFX_BASE64 }}"))

      - name: Build Windows Distributions
        shell: pwsh
        run: |
          ./gradlew :composeApp:packageMsi :composeApp:packageExe :composeApp:createPortableZip --no-daemon "-PappVersion=${{ steps.version.outputs.version_name }}" "-PappBuildNumber=${{ steps.version.outputs.build_num }}" "-Pcompose.desktop.signing.sign=true" "-Pcompose.desktop.signing.certificateFile=../signing/windows.pfx" "-Pcompose.desktop.signing.keyPassword=${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Collect Windows Artifacts
        shell: bash
        run: |
          mkdir -p dist
          find composeApp/build/compose/binaries/main/msi/  -name '*.msi' -exec cp {} dist/ \;
          find composeApp/build/distributions/               -name '*.zip' -exec cp {} dist/ \;

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-distributions
          path: dist/
          if-no-files-found: error

  create-release:
    needs: [build-android, build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List Artifacts (Debug)
        run: ls -R .
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-apks/*.apk
            linux-distributions/*.deb
            linux-distributions/*.rpm
            linux-distributions/*.AppImage
            linux-distributions/*.zip
            windows-distributions/*.msi
            windows-distributions/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
