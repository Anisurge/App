# Paste into your *build* repo (not App-main), e.g.:
#   .github/workflows/build-and-release-from-app-main.yml
#
# Checks out Anisurge/App-main for source. Requires secrets:
#   APP_MAIN_TOKEN, ANDROID_KEYSTORE_BASE64, KEYSTORE_PASSWORD
# Optional: GOOGLE_SERVICES_JSON_BASE64, CRASH_REPORTER_*, DISCORD_* vars
#
# Produces:
#   Android phone+TV: arm64-v8a, armeabi-v7a, x86_64, universal APKs
#   Windows: x86_64 MSI / setup EXE / portable zip
#   Linux:  x86_64 (amd64) deb / rpm / AppImage / portable zip
#   macOS:  arm64 + x64 (Intel) DMG + portable zip

name: Build and Release from App-main

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "App version (empty = app-version from gradle/libs.versions.toml)"
        required: false
        default: ""
      build_number:
        description: "Android versionCode / build suffix (empty = max(toml build, 15+run#))"
        required: false
        default: ""
      create_release:
        description: "Upload artifacts to a GitHub Release (tag pushes always release)"
        type: boolean
        default: false
      build_ios:
        description: "Build unsigned iOS IPA"
        type: boolean
        default: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      build_num: ${{ steps.version.outputs.build_num }}
    steps:
      - name: Checkout App-main source
        uses: actions/checkout@v4
        with:
          repository: Anisurge/App-main
          token: ${{ secrets.APP_MAIN_TOKEN }}

      - name: Resolve version and build number
        id: version
        run: |
          set -euo pipefail
          TOML_VERSION=$(grep '^app-version' gradle/libs.versions.toml | sed 's/.*= *"\(.*\)"/\1/')
          TOML_BUILD=$(grep '^app-buildNumber' gradle/libs.versions.toml | sed 's/.*= *"\(.*\)"/\1/')
          OFFSET=15
          CI_BUILD=$((OFFSET + GITHUB_RUN_NUMBER))

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION_NAME="${{ inputs.version }}"
            [[ -z "$VERSION_NAME" ]] && VERSION_NAME="$TOML_VERSION"
            BUILD_INPUT="${{ inputs.build_number }}"
            if [[ -n "$BUILD_INPUT" ]]; then
              BUILD_NUMBER="$BUILD_INPUT"
            else
              BUILD_NUMBER=$(( TOML_BUILD > CI_BUILD ? TOML_BUILD : CI_BUILD ))
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
            BUILD_NUMBER="$CI_BUILD"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/}"
            BUILD_NUMBER="$CI_BUILD"
          else
            VERSION_NAME="$TOML_VERSION"
            BUILD_NUMBER="$CI_BUILD"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_num=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "## Build **${VERSION_NAME}+${BUILD_NUMBER}**" >> "$GITHUB_STEP_SUMMARY"

  build-android:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App-main source
        uses: actions/checkout@v4
        with:
          repository: Anisurge/App-main
          token: ${{ secrets.APP_MAIN_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret not set — cannot sign APK"
            exit 1
          fi
          mkdir -p signing
          echo "$KEYSTORE_B64" | base64 --decode > signing/android.jks
          echo "storePassword=$KEY_PASS" > key.properties
          echo "keyPassword=$KEY_PASS" >> key.properties
          echo "keyAlias=release" >> key.properties
          echo "storeFile=../signing/android.jks" >> key.properties

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_SECRET" ]; then
            echo "No GOOGLE_SERVICES_JSON_BASE64 secret set — skipping"
            exit 0
          fi
          python3 - <<'PY'
          import base64, json, os
          from pathlib import Path
          secret = os.environ["GOOGLE_SERVICES_SECRET"].strip()
          candidates = []
          try:
              decoded = base64.b64decode("".join(secret.split()), validate=True).decode("utf-8")
              candidates.append(decoded)
          except Exception:
              pass
          candidates.append(secret)
          for candidate in candidates:
              try:
                  json.loads(candidate)
              except Exception:
                  continue
              Path("composeApp/google-services.json").write_text(candidate)
              break
          else:
              raise SystemExit("GOOGLE_SERVICES_JSON_BASE64 is neither valid base64 JSON nor raw JSON")
          PY

      - name: Build Android Phone + TV APKs
        env:
          CRASH_REPORTER_URL: ${{ secrets.CRASH_REPORTER_URL }}
          CRASH_REPORTER_APP_NAME: ${{ secrets.CRASH_REPORTER_APP_NAME }}
          CRASH_REPORTER_API_KEY: ${{ secrets.CRASH_REPORTER_API_KEY }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_LARGE_IMAGE_KEY: ${{ vars.DISCORD_LARGE_IMAGE_KEY }}
          DISCORD_SMALL_IMAGE_KEY: ${{ vars.DISCORD_SMALL_IMAGE_KEY }}
        run: |
          chmod +x gradlew
          # Multi-ABI: arm64-v8a + armeabi-v7a + x86_64 splits + universal (phone + TV)
          # App-main defaults to this; flags kept explicit so a future default flip cannot go arm64-only.
          ./gradlew :composeApp:assemblePhoneRelease :composeApp:assembleTvRelease --no-daemon \
            -x :composeApp:lintVitalPhoneRelease \
            -x :composeApp:lintVitalTvRelease \
            -PappVersion="${{ needs.resolve-version.outputs.version_name }}" \
            -PappBuildNumber="${{ needs.resolve-version.outputs.build_num }}" \
            -PcrashReporterUrl="$CRASH_REPORTER_URL" \
            -PcrashReporterAppName="$CRASH_REPORTER_APP_NAME" \
            -PcrashReporterApiKey="$CRASH_REPORTER_API_KEY" \
            -PfullAbi=true \
            -PuniversalApk=true

      - name: Collect Android Phone + TV APKs
        run: |
          set -euo pipefail
          mkdir -p dist
          # Gradle renames composeApp- → anisurgex- (see App-main composeApp/build.gradle.kts).
          # Stable release names: Anisurge-phone-*.apk and Anisurge-tv-*.apk
          for flavor in phone tv; do
            shopt -s nullglob
            apks=(composeApp/build/outputs/apk/"$flavor"/release/*.apk)
            if [[ ${#apks[@]} -eq 0 ]]; then
              echo "::error::No $flavor release APKs under composeApp/build/outputs/apk/$flavor/release/"
              exit 1
            fi
            for apk in "${apks[@]}"; do
              base=$(basename "$apk")
              # anisurgex-phone-arm64-v8a-release.apk → Anisurge-phone-arm64-v8a-release.apk
              # anisurgex-tv-universal-release.apk → Anisurge-tv-universal-release.apk
              stripped="${base#anisurgex-}"
              new_name="Anisurge-${stripped}"
              cp "$apk" "dist/$new_name"
            done
          done
          echo "Android artifacts:"
          ls -lh dist/
          ls dist/Anisurge-phone-*.apk >/dev/null
          ls dist/Anisurge-tv-*.apk >/dev/null
          # Expect multi-ABI (at least arm64 + one more or universal)
          if ! ls dist/Anisurge-phone-arm64-v8a-release.apk >/dev/null 2>&1; then
            echo "::error::Missing phone arm64-v8a APK"
            exit 1
          fi

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App-main source
        uses: actions/checkout@v4
        with:
          repository: Anisurge/App-main
          token: ${{ secrets.APP_MAIN_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # libmpv2 + codecs for bundled lib/mpv (like Windows mpv-2.dll); patchelf for $ORIGIN rpath
          # Without libmpv2 the release is ~150MB and shows "Video player unavailable" on Fedora.
          sudo apt-get install -y dpkg-dev rpm desktop-file-utils fakeroot p7zip-full libfuse2 \
            libmpv2 libmpv-dev patchelf binutils
          ls -la /usr/lib/x86_64-linux-gnu/libmpv.so* /usr/lib64/libmpv.so* 2>/dev/null || true
          ldconfig -p | grep -i libmpv || { echo "::error::libmpv not in ldconfig after apt install"; dpkg -L libmpv2 | head -40; exit 1; }
          mkdir -p "$HOME/bin"
          curl -sLo "$HOME/bin/appimagetool" "https://github.com/AppImage/appimagetool/releases/latest/download/appimagetool-x86_64.AppImage"
          chmod +x "$HOME/bin/appimagetool"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Bundle libmpv for Linux packages
        run: |
          set -euo pipefail
          chmod +x scripts/bundle-linux-libmpv.sh
          mkdir -p composeApp/src/desktopMain/resources/native/linux
          ./scripts/bundle-linux-libmpv.sh composeApp/src/desktopMain/resources/native/linux
          test -e composeApp/src/desktopMain/resources/native/linux/libmpv.so.2 \
            || test -e composeApp/src/desktopMain/resources/native/linux/libmpv.so \
            || { echo "::error::libmpv bundle missing after bundle-linux-libmpv.sh"; ls -la composeApp/src/desktopMain/resources/native/linux; exit 1; }
          SIZE_MB=$(du -sm composeApp/src/desktopMain/resources/native/linux | awk '{print $1}')
          echo "Bundled libmpv tree: ${SIZE_MB} MB"
          ls -lh composeApp/src/desktopMain/resources/native/linux/libmpv.so* || true
          du -sh composeApp/src/desktopMain/resources/native/linux
          if [[ "$SIZE_MB" -lt 20 ]]; then
            echo "::error::libmpv bundle only ${SIZE_MB} MB — expected 50–160 MB with codecs"
            ls -la composeApp/src/desktopMain/resources/native/linux | head -50
            exit 1
          fi

      - name: Build Linux Distributions
        env:
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_LARGE_IMAGE_KEY: ${{ vars.DISCORD_LARGE_IMAGE_KEY }}
          DISCORD_SMALL_IMAGE_KEY: ${{ vars.DISCORD_SMALL_IMAGE_KEY }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew :composeApp:prepareLinuxAppResources \
            :composeApp:packageDeb :composeApp:packageRpm :composeApp:buildLinuxAppImage :composeApp:createPortableZip --no-daemon \
            -PappVersion="${{ needs.resolve-version.outputs.version_name }}" \
            -PappBuildNumber="${{ needs.resolve-version.outputs.build_num }}"
          ZIP=$(find composeApp/build/distributions -name '*linux*portable*.zip' -o -name '*.zip' | head -1)
          if [[ -z "$ZIP" ]]; then
            echo "::error::No portable zip produced"
            exit 1
          fi
          echo "Checking $ZIP for libmpv…"
          unzip -l "$ZIP" | grep -E 'lib/mpv/libmpv\.so|resources/mpv/libmpv\.so' \
            || { echo "::error::Linux portable zip missing libmpv — packaging inject failed"; unzip -l "$ZIP" | head -60; exit 1; }
          ZIP_MB=$(du -sm "$ZIP" | awk '{print $1}')
          echo "Portable zip size: ${ZIP_MB} MB"
          if [[ "$ZIP_MB" -lt 200 ]]; then
            echo "::error::Portable zip only ${ZIP_MB} MB — libmpv tree almost certainly missing"
            unzip -l "$ZIP" | grep -E 'mpv|\.so' | head -40
            exit 1
          fi
          DEB=$(find composeApp/build/compose/binaries/main/deb -name '*.deb' 2>/dev/null | head -1 || true)
          if [[ -n "$DEB" ]]; then
            dpkg-deb -c "$DEB" | grep -E 'lib/mpv/libmpv\.so|resources/mpv/libmpv\.so' \
              || { echo "::error::.deb missing libmpv"; dpkg-deb -c "$DEB" | head -40; exit 1; }
          fi

      - name: Collect Linux Artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          # Desktop Linux is always x86_64 on ubuntu-latest.
          HOST_ARCH="$(uname -m)"
          if [[ "$HOST_ARCH" != "x86_64" ]]; then
            echo "::error::Linux desktop job must run on x86_64 (got $HOST_ARCH)"
            exit 1
          fi
          ARCH="amd64"
          DEB_FILE=$(find composeApp/build/compose/binaries/main/deb/ -name '*.deb' | head -n 1 || true)
          RPM_FILE=$(find composeApp/build/compose/binaries/main/rpm/ -name '*.rpm' | head -n 1 || true)
          APPIMAGE_FILE=$(find composeApp/build/compose/binaries/main/appimage/ -name '*.AppImage' | head -n 1 || true)
          ZIP_FILE=$(find composeApp/build/distributions/ -name '*.zip' | head -n 1 || true)

          [[ -n "$DEB_FILE" ]] && cp "$DEB_FILE" "dist/Anisurge-linux-${ARCH}.deb"
          [[ -n "$RPM_FILE" ]] && cp "$RPM_FILE" "dist/Anisurge-linux-${ARCH}.rpm"
          [[ -n "$APPIMAGE_FILE" ]] && cp "$APPIMAGE_FILE" "dist/Anisurge-linux-${ARCH}.AppImage"
          [[ -n "$ZIP_FILE" ]] && cp "$ZIP_FILE" "dist/Anisurge-linux-${ARCH}-portable.zip"
          # x86_64 aliases (same bits as amd64) for clearer download names
          for f in dist/Anisurge-linux-${ARCH}*; do
            [[ -f "$f" ]] || continue
            base=$(basename "$f")
            cp "$f" "dist/${base//amd64/x86_64}"
          done
          ls -lh dist/

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-distributions
          path: dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - name: Checkout App-main source
        uses: actions/checkout@v4
        with:
          repository: Anisurge/App-main
          token: ${{ secrets.APP_MAIN_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Download and Bundle MPV Library
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $nativeDir = "composeApp\src\desktopMain\resources\native"
          New-Item -ItemType Directory -Force -Path $nativeDir | Out-Null
          $headers = @{ "User-Agent" = "Mozilla/5.0"; "Authorization" = "Bearer $env:GH_TOKEN" }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases?per_page=20" -Headers $headers
          $asset = $releases | ForEach-Object { $_.assets } | Where-Object { $_.name -like "mpv-dev-x86_64-v3-*.7z" -or $_.name -like "mpv-dev-x86_64-*.7z" } | Select-Object -First 1
          if (-not $asset) { throw "Could not find an mpv-dev x86_64 release asset" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "mpv-dev.7z" -Headers $headers
          7z x mpv-dev.7z -ompv-extracted
          $dlls = Get-ChildItem -Path "mpv-extracted" -Recurse -Filter "*.dll"
          if (-not $dlls) { throw "No DLLs were found in the extracted MPV archive" }
          foreach ($dll in $dlls) {
            Copy-Item $dll.FullName (Join-Path $nativeDir $dll.Name) -Force
          }
          $libMpv = Join-Path $nativeDir "libmpv-2.dll"
          $mpv2 = Join-Path $nativeDir "mpv-2.dll"
          if ((Test-Path $libMpv) -and -not (Test-Path $mpv2)) {
            Copy-Item $libMpv $mpv2 -Force
          }
          if ((Test-Path $libMpv) -and (Test-Path $mpv2)) {
            Remove-Item $libMpv -Force
            Write-Host "Removed duplicate libmpv-2.dll (keeping mpv-2.dll only)"
          }
          Get-ChildItem $nativeDir -Filter "*.dll" | Where-Object {
            $_.Name -match '^(lib)?mpv' -and $_.Name -ne 'mpv-2.dll'
          } | ForEach-Object {
            Write-Host "Removing extra player DLL $($_.Name)"
            Remove-Item $_.FullName -Force
          }
          if (-not (Test-Path $mpv2)) { throw "mpv-2.dll was not found after bundling MPV dependencies" }
          Write-Host "Bundled MPV (single player DLL):"; Get-ChildItem $nativeDir -Filter "*.dll" | ForEach-Object { "$($_.Name) $([math]::Round($_.Length/1MB,1)) MB" }

      - name: Download and Bundle FFmpeg
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $nativeDir = "composeApp\src\desktopMain\resources\native"
          New-Item -ItemType Directory -Force -Path $nativeDir | Out-Null
          $headers = @{ "User-Agent" = "Mozilla/5.0"; "Authorization" = "Bearer $env:GH_TOKEN" }
          Write-Host "Downloading FFmpeg static build..."
          $ffRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest" -Headers $headers
          $ffAsset = $ffRelease.assets | Where-Object { $_.name -like "*win64-gpl*" -and $_.name -like "*.zip" } | Select-Object -First 1
          if (-not $ffAsset) { throw "Could not find a win64-gpl FFmpeg release asset" }
          Invoke-WebRequest -Uri $ffAsset.browser_download_url -OutFile "ffmpeg.zip" -Headers $headers
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-extracted" -Force
          $ffmpegExe = Get-ChildItem -Path "ffmpeg-extracted" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if (-not $ffmpegExe) { throw "ffmpeg.exe not found in extracted archive" }
          Copy-Item $ffmpegExe.FullName (Join-Path $nativeDir "ffmpeg.exe") -Force
          Write-Host "FFmpeg bundled: $((Get-Item (Join-Path $nativeDir "ffmpeg.exe")).Length / 1MB) MB"

      - name: Build Windows Distributions
        shell: pwsh
        env:
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_LARGE_IMAGE_KEY: ${{ vars.DISCORD_LARGE_IMAGE_KEY }}
          DISCORD_SMALL_IMAGE_KEY: ${{ vars.DISCORD_SMALL_IMAGE_KEY }}
        run: |
          $gradleCommon = @(
            "--no-daemon",
            "--no-parallel",
            "-PappVersion=${{ needs.resolve-version.outputs.version_name }}",
            "-PappBuildNumber=${{ needs.resolve-version.outputs.build_num }}"
          )
          # Stage mpv into app-resources (jpackage MSI/EXE) then package
          ./gradlew @gradleCommon :composeApp:prepareWindowsAppResources
          # Package MSI and EXE separately — running both in one Gradle invocation can corrupt the shared app image.
          ./gradlew @gradleCommon :composeApp:packageMsi
          ./gradlew @gradleCommon :composeApp:packageExe
          ./gradlew @gradleCommon :composeApp:createPortableZip
          # Portable zip must contain exactly one fat player DLL
          $zip = Get-ChildItem -Path "composeApp\build\distributions" -Filter "*.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($zip) {
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            $z = [System.IO.Compression.ZipFile]::OpenRead($zip.FullName)
            $mpvEntries = $z.Entries | Where-Object { $_.Name -match '^(mpv-2|libmpv-2)\.dll$' }
            $z.Dispose()
            $names = ($mpvEntries | ForEach-Object { $_.FullName }) -join ', '
            Write-Host "Portable zip mpv entries: $names"
            $count = @($mpvEntries).Count
            if ($count -lt 1) { throw "Portable zip missing mpv-2.dll" }
            if ($count -gt 1) { throw "Portable zip has $count mpv DLLs — expected only mpv-2.dll" }
          }

      - name: Validate Windows MSI (smoke test)
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "composeApp\build\compose\binaries\main\msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) { throw "No MSI produced under composeApp/build/compose/binaries/main/msi" }
          $target = Join-Path $env:RUNNER_TEMP "anisurge-msi-smoke"
          if (Test-Path $target) { Remove-Item $target -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          $args = @("/a", "`"$($msi.FullName)`"", "TARGETDIR=`"$target`"", "/qn", "/l*v", "`"$env:RUNNER_TEMP\anisurge-msi-smoke.log`"")
          $proc = Start-Process -FilePath "msiexec.exe" -ArgumentList $args -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            Get-Content "$env:RUNNER_TEMP\anisurge-msi-smoke.log" -ErrorAction SilentlyContinue | Select-Object -Last 40
            throw "MSI administrative install failed with exit code $($proc.ExitCode) (user installs often see 2318 when this fails)"
          }
          $appDir = Get-ChildItem -Path $target -Recurse -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '^(AniSurgeX|Anisurge)$' } |
            Select-Object -First 1
          if (-not $appDir) { throw "MSI extracted but AniSurgeX/Anisurge app folder was not found under $target" }
          $mpv = Get-ChildItem -Path $appDir.FullName -Recurse -Filter "mpv-2.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $mpv) {
            $mpv = Get-ChildItem -Path $appDir.FullName -Recurse -Filter "libmpv-2.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $mpv) {
            throw "MSI missing mpv-2.dll / libmpv-2.dll under $($appDir.FullName) — Windows playback would fail"
          }
          Write-Host "MSI smoke test OK — extracted to $($appDir.FullName); libmpv=$($mpv.FullName)"

      - name: Collect Windows Artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Desktop Windows ships x86_64 only (windows-latest is amd64).
          ARCH="x86_64"
          MSI_FILE=$(find composeApp/build/compose/binaries/main/msi/ -name '*.msi' | head -n 1 || true)
          EXE_FILE=$(find composeApp/build/compose/binaries/main/exe/ -name '*.exe' | head -n 1 || true)
          ZIP_FILE=$(find composeApp/build/distributions/ -name '*.zip' | head -n 1 || true)

          [[ -n "$MSI_FILE" ]] && cp "$MSI_FILE" "dist/Anisurge-win-${ARCH}.msi"
          [[ -n "$EXE_FILE" ]] && cp "$EXE_FILE" "dist/Anisurge-win-${ARCH}-setup.exe"
          [[ -n "$ZIP_FILE" ]] && cp "$ZIP_FILE" "dist/Anisurge-win-${ARCH}-portable.zip"
          # x64 aliases for site keys / clarity (same as x86_64)
          for f in dist/Anisurge-win-${ARCH}*; do
            [[ -f "$f" ]] || continue
            base=$(basename "$f")
            cp "$f" "dist/${base//x86_64/x64}"
          done
          ls -lh dist/

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-distributions
          path: dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  # Desktop macOS: ship BOTH Apple Silicon (arm64) and Intel (x64 / x86_64).
  # macos-latest is arm64; x64 uses a Temurin x64 JDK under Rosetta so Intel Macs get a real x86_64 build.
  build-macos:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            java_arch: aarch64
            use_rosetta: false
          - arch: x64
            java_arch: x64
            use_rosetta: true
    runs-on: macos-latest
    steps:
      - name: Checkout App-main source
        uses: actions/checkout@v4
        with:
          repository: Anisurge/App-main
          token: ${{ secrets.APP_MAIN_TOKEN }}

      - name: Install Rosetta (x64 JDK / jpackage under translation)
        if: matrix.use_rosetta
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Set up JDK 21 (${{ matrix.arch }})
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          architecture: ${{ matrix.java_arch }}

      - name: Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install MPV (playback on desktop)
        run: brew install mpv

      - name: Generate macOS app icon (.icns)
        run: bash scripts/generate-macos-icon.sh

      - name: Build macOS DMG and portable zip (${{ matrix.arch }})
        env:
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_LARGE_IMAGE_KEY: ${{ vars.DISCORD_LARGE_IMAGE_KEY }}
          DISCORD_SMALL_IMAGE_KEY: ${{ vars.DISCORD_SMALL_IMAGE_KEY }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          ARCH="${{ matrix.arch }}"
          echo "Host uname -m: $(uname -m); matrix arch: $ARCH"
          java -XshowSettings:properties -version 2>&1 | grep -E 'os\.(arch|name)|java.home' || true
          GRADLE_ARGS=(
            :composeApp:packageDistributionForCurrentOS
            :composeApp:createPortableZip
            --no-daemon
            -PappVersion="${{ needs.resolve-version.outputs.version_name }}"
            -PappBuildNumber="${{ needs.resolve-version.outputs.build_num }}"
          )
          if [[ "${{ matrix.use_rosetta }}" == "true" ]]; then
            # Force x86_64 process so skiko/jpackage match the x64 Temurin JDK
            arch -x86_64 ./gradlew "${GRADLE_ARGS[@]}"
          else
            ./gradlew "${GRADLE_ARGS[@]}"
          fi

      - name: Collect macOS Artifacts (${{ matrix.arch }})
        run: |
          set -euo pipefail
          mkdir -p dist
          ARCH="${{ matrix.arch }}"
          DMG_FILE=$(find composeApp/build/compose/binaries/main/dmg/ -name '*.dmg' | head -n 1 || true)
          ZIP_FILE=$(find composeApp/build/distributions/ -name '*.zip' | head -n 1 || true)

          if [[ -z "$DMG_FILE" ]]; then
            echo "::error::No .dmg produced for $ARCH — check packageDistributionForCurrentOS logs"
            exit 1
          fi
          # Arch-tagged names match site keys: arm64-dmg / x64-dmg / arm64-zip / x64-zip
          cp "$DMG_FILE" "dist/Anisurge-macos-${ARCH}.dmg"
          [[ -n "$ZIP_FILE" ]] && cp "$ZIP_FILE" "dist/Anisurge-macos-${ARCH}-portable.zip"
          # Keep legacy untagged names for arm64 so old download URLs keep working
          if [[ "$ARCH" == "arm64" ]]; then
            cp "dist/Anisurge-macos-arm64.dmg" "dist/Anisurge-macos.dmg"
            [[ -f "dist/Anisurge-macos-arm64-portable.zip" ]] && \
              cp "dist/Anisurge-macos-arm64-portable.zip" "dist/Anisurge-macos-portable.zip"
          fi
          echo "macOS $ARCH artifacts:"
          ls -lh dist/
          file "dist/Anisurge-macos-${ARCH}.dmg" || true

      - name: Upload macOS Artifacts (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: macos-distributions-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  # iOS is opt-in only. Tag pushes do NOT build iOS.
  build-ios:
    needs: resolve-version
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ios }}
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout App-main source
        uses: actions/checkout@v4
        with:
          repository: Anisurge/App-main
          token: ${{ secrets.APP_MAIN_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build iOS Framework
        env:
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_LARGE_IMAGE_KEY: ${{ vars.DISCORD_LARGE_IMAGE_KEY }}
          DISCORD_SMALL_IMAGE_KEY: ${{ vars.DISCORD_SMALL_IMAGE_KEY }}
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:linkPodReleaseFrameworkIosArm64 :composeApp:linkPodReleaseFrameworkIosSimulatorArm64 --no-daemon \
            -PappVersion="${{ needs.resolve-version.outputs.version_name }}" \
            -PappBuildNumber="${{ needs.resolve-version.outputs.build_num }}"

      - name: Build iOS App (Unsigned IPA)
        run: |
          mkdir -p dist
          cd iosApp
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ../build/ios.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          cd ..
          mkdir -p Payload
          cp -R build/ios.xcarchive/Products/Applications/iosApp.app Payload/
          VER="${{ needs.resolve-version.outputs.version_name }}"
          BUILD="${{ needs.resolve-version.outputs.build_num }}"
          zip -r "dist/Anisurge-${VER}.${BUILD}-ios-unsigned.ipa" Payload
          rm -rf Payload
          ls -lh dist/

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-distributions
          path: dist/
          if-no-files-found: warn

  create-release:
    needs:
      - resolve-version
      - build-android
      - build-linux
      - build-windows
      - build-macos
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( \
            -name '*.apk' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o \
            -name '*.zip' -o -name '*.msi' -o -name '*-setup.exe' -o -name '*.dmg' -o -name '*.ipa' \
          \) -exec cp {} release/ \;
          echo "Release bundle:"
          ls -lh release/
          if [[ -z "$(ls -A release 2>/dev/null)" ]]; then
            echo "::error::No release artifacts found"
            exit 1
          fi
          # TV build is required for every release
          if ! ls release/Anisurge-tv-*.apk >/dev/null 2>&1; then
            echo "::error::Missing Anisurge-tv-*.apk — TV flavor must be in the release"
            exit 1
          fi
          # Desktop: Windows/Linux x86_64; macOS arm64 + Intel x64
          if ! ls release/Anisurge-win-x86_64* >/dev/null 2>&1; then
            echo "::error::Missing Windows x86_64 desktop packages"
            exit 1
          fi
          if ! ls release/Anisurge-linux-amd64* >/dev/null 2>&1 && ! ls release/Anisurge-linux-x86_64* >/dev/null 2>&1; then
            echo "::error::Missing Linux x86_64/amd64 desktop packages"
            exit 1
          fi
          if ! ls release/Anisurge-macos-arm64.dmg >/dev/null 2>&1; then
            echo "::error::Missing Anisurge-macos-arm64.dmg"
            exit 1
          fi
          if ! ls release/Anisurge-macos-x64.dmg >/dev/null 2>&1; then
            echo "::error::Missing Anisurge-macos-x64.dmg (Intel / x86_64)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', needs.resolve-version.outputs.version_name) }}
          name: Anisurge ${{ needs.resolve-version.outputs.version_name }} (${{ needs.resolve-version.outputs.build_num }})
          body: |
            Built from [Anisurge/App-main](https://github.com/Anisurge/App-main).

            Version **${{ needs.resolve-version.outputs.version_name }}** (build ${{ needs.resolve-version.outputs.build_num }})

            ### Downloads
            - **Android phone:** `Anisurge-phone-*-release.apk` (arm64-v8a / armeabi-v7a / x86_64 / universal)
            - **Android TV:** `Anisurge-tv-*-release.apk` (same ABIs; package id `com.r3ap3redit.anisurgex.tv`)
            - **Windows (x86_64):** `Anisurge-win-x86_64.msi` / setup EXE / portable zip
            - **Linux (x86_64 / amd64):** `Anisurge-linux-amd64.*` (also `*-x86_64.*` aliases)
            - **macOS:** Apple Silicon `Anisurge-macos-arm64.*` + Intel `Anisurge-macos-x64.*` (DMG + portable zip)

            ### Site admin file keys (anisurge.lol)
            - macOS: `arm64-dmg`, `x64-dmg`, `arm64-zip`, `x64-zip`
            - Windows: `x64-msi`, `x64-installer`, `x64-portable`
            - Linux: `x64-deb`, `x64-rpm`, `x64-appimage`, `x64-portable`
          files: |
            release/*
          generate_release_notes: true
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
